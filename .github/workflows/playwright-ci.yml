name: Playwright CI - QBank Login Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run every day at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - all
      headless:
        description: 'Run in headless mode'
        required: false
        default: 'true'
        type: boolean

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_VERSION: '1.44.0'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Install & Cache Dependencies
  # ─────────────────────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install npm dependencies
        run: npm ci

      - name: 🎭 Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: 🌐 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────────
  # JOB 2: Run Tests on Chromium
  # ─────────────────────────────────────────────
  test-chromium:
    name: 🟡 Tests - Chromium
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Restore Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: 🔧 Install Playwright system deps (if cache miss)
        run: npx playwright install-deps chromium

      - name: 🧪 Run Playwright Tests - Chromium
        run: npx playwright test --project=chromium
        env:
          QBANK_USERNAME: ${{ secrets.QBANK_USERNAME }}
          QBANK_PASSWORD: ${{ secrets.QBANK_PASSWORD }}
          CI: true

      - name: 📊 Upload Chromium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 30

      - name: 📸 Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-chromium-failure
          path: screenshots/
          retention-days: 7

      - name: 🎥 Upload Test Videos on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: videos-chromium-failure
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Run Tests on Firefox
  # ─────────────────────────────────────────────
  test-firefox:
    name: 🦊 Tests - Firefox
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Restore Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: 🔧 Install Firefox system deps
        run: npx playwright install-deps firefox

      - name: 🧪 Run Playwright Tests - Firefox
        run: npx playwright test --project=firefox
        env:
          QBANK_USERNAME: ${{ secrets.QBANK_USERNAME }}
          QBANK_PASSWORD: ${{ secrets.QBANK_PASSWORD }}
          CI: true

      - name: 📊 Upload Firefox Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-firefox
          path: playwright-report/
          retention-days: 30

      - name: 📸 Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-firefox-failure
          path: screenshots/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Publish Test Results Summary
  # ─────────────────────────────────────────────
  report:
    name: 📋 Publish Test Summary
    runs-on: ubuntu-latest
    needs: [test-chromium, test-firefox]
    if: always()
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Chromium Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-chromium
          path: reports/chromium
        continue-on-error: true

      - name: 📥 Download Firefox Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-firefox
          path: reports/firefox
        continue-on-error: true

      - name: 📋 Post Test Summary to GitHub
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const chromiumStatus = '${{ needs.test-chromium.result }}';
            const firefoxStatus  = '${{ needs.test-firefox.result }}';
            const emoji = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            const body = `## 🎭 Playwright Test Results
            | Browser   | Status |
            |-----------|--------|
            | Chromium  | ${emoji(chromiumStatus)} ${chromiumStatus} |
            | Firefox   | ${emoji(firefoxStatus)} ${firefoxStatus} |

            > Reports are available in the **Actions > Artifacts** section.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });