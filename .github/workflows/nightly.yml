name: Playwright Nightly - Full Regression

on:
  schedule:
    # Run every night at 11:00 PM UTC (4:30 AM IST)
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_VERSION: '1.44.0'

jobs:
  nightly-regression:
    name: 🌙 Nightly Full Regression
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🌐 Install Playwright & Browsers
        run: npx playwright install --with-deps

      - name: 🧪 Run Full Regression - ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }} --retries=2
        env:
          QBANK_USERNAME: ${{ secrets.QBANK_USERNAME }}
          QBANK_PASSWORD: ${{ secrets.QBANK_PASSWORD }}
          CI: true

      - name: 📊 Upload Report - ${{ matrix.browser }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-report-${{ matrix.browser }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  notify:
    name: 📧 Notify on Failure
    runs-on: ubuntu-latest
    needs: nightly-regression
    if: failure()
    steps:
      - name: 🔔 Send Failure Notification
        uses: actions/github-script@v7
        with:
          script: |
            console.log('❌ Nightly regression FAILED. Notify your team here.');
            // Add Slack/Teams/Email webhook integration here